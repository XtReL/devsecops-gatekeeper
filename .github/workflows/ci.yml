name: Security & Integration Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  audit-and-lint:
    name: Security Audit & Quality Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Initialize Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      # 1. Сканирование на утечку секретов
      - name: GitGuardian Shield Scan
        uses: GitGuardian/ggshield-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}

      # 2. Превентивный ИБ-анализ кода (SAST)
      - name: Run Gosec Security Scanner
        uses: securego/gosec@master
        with:
          args: '-exclude=G104,G108 ./...'

      # 3. Строгий контроль качества кода
      - name: Golangci-lint Execution
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.59
          args: --timeout=5m

  test-and-build:
    name: Compile & Execute Verification Tests
    needs: audit-and-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Initialize Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      # Запуск тестов на моковых переменных
      - name: Execute Deterministic Unit Tests
        env:
          STRIPE_WEBHOOK_SECRET: "whsec_mock_secret_for_ci_testing"
          SPICEDB_PRESHARED_KEY: "mock_key"
          DATABASE_URL: "postgres://postgres:postgres@localhost:5432/db?sslmode=disable"
        run: |
          go test -v -race -timeout 30s ./...

      # Проверка компиляции финального бинарника для Production
      - name: Verify Production Compilation
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-w -s" -o ./bin/gateway ./cmd/api/main.go